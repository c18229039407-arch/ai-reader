name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  app:
    name: analyze & test (app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          # 与开发环境对齐的已验证版本；升级时同步更新
          flutter-version: 3.35.3
          cache: true

      - name: 依赖解析
        run: flutter pub get

      - name: 静态分析
        run: flutter analyze

      - name: 单元与界面测试
        # e2e 测试需要网络与 Ollama，默认 skip，不在 CI 跑
        run: flutter test
