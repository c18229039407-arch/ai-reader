name: ai_reader
description: "林间阅读 (Linjian Reader) — 本地优先、AI 辅助理解的开源电子书阅读器（Phase 1 MVP: macOS）"
publish_to: "none"
version: 0.2.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  epubx: ^4.0.0
  http: ^1.2.0
  file_picker: ^8.0.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  path: ^1.9.0
  crypto: ^3.0.0
  animations: ^2.0.0
  window_manager: ^0.4.2
  pdfrx: ^1.3.5
  url_launcher: ^6.3.0
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/logo.png

